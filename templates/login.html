{% extends "base.html" %}

{% block login_content %}
<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="col-md-5">
        <div class="card shadow-lg border-0 rounded-4">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center"
                        style="width: 60px; height: 60px;">
                        <i class="fa-solid fa-brain fs-3"></i>
                    </div>
                    <h2 class="mt-3 font-weight-bold">AI Payroll</h2>
                    <p class="text-muted">Enterprise Intelligence Platform</p>
                </div>

                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label text-secondary fw-bold small">USERNAME</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username"
                                required placeholder="admin">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="password" class="form-label text-secondary fw-bold small">PASSWORD</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i
                                    class="fa-solid fa-lock text-muted"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password"
                                name="password" required placeholder="admin">
                        </div>
                    </div>

                    <div class="mb-4 d-flex justify-content-between align-items-center">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                            <label class="form-check-label text-muted small" for="remember_me">Remember Me</label>
                        </div>
                    </div>

                    <button type="submit"
                        class="btn btn-primary w-100 py-2 fw-bold text-uppercase fs-6 rounded-3">Access System</button>
                </form>
            </div>
        </div>
        <div class="text-center mt-4 text-muted small">
            &copy; 2026 AI Payroll Systems Inc.
        </div>
    </div>
</div>
{% endblock %}
